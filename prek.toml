minimum_prek_version = "0.4.2"
default_install_hook_types = ["pre-commit"]

[[repos]]
repo = "local"
hooks = [
  {
    id = "biome-check",
    name = "Biome check",
    language = "system",
    entry = "task check",
    pass_filenames = false,
    always_run = true,
    stages = ["pre-commit"],
  },
]
