version: "3"

tasks:
  setup:
    desc: Install dependencies and create .env.local if it does not exist.
    cmds:
      - bun install
      - test -f .env.local || cp .env.example .env.local

  dev:
    desc: Start the development server.
    cmds:
      - bun run dev

  build:
    desc: Build the app for production.
    cmds:
      - bun run build

  check:
    desc: Run Biome checks.
    cmds:
      - bun run check

  check:write:
    desc: Run Biome checks and apply safe fixes.
    cmds:
      - bun run check:write

  hooks:install:
    desc: Install the prek pre-commit hook.
    cmds:
      - mise exec -- prek install -f

  hooks:validate:
    desc: Validate the prek configuration.
    cmds:
      - mise exec -- prek validate-config prek.toml

  hooks:run:
    desc: Run prek hooks across all files.
    cmds:
      - mise exec -- prek run --all-files

  typecheck:
    desc: Generate Next route types and run TypeScript.
    cmds:
      - bun run typecheck

  test:
    desc: Run unit tests in watch mode.
    cmds:
      - bun run test

  test:run:
    desc: Run unit tests once.
    cmds:
      - bun run test:run

  test:watch:
    desc: Run unit tests in watch mode.
    cmds:
      - bun run test

  e2e:
    desc: Run the Playwright smoke test.
    cmds:
      - bun run e2e

  e2e:ui:
    desc: Run Playwright in UI mode.
    cmds:
      - bun run e2e:ui

  docker:up:
    desc: Start app only (assumes hosted Supabase in .env.local).
    cmds:
      - docker compose -f .docker/compose.yml --profile dev up --build

  docker:up:db:
    desc: Start self-hosted Supabase only.
    cmds:
      - docker compose -f .docker/compose.yml --profile local-db up --build

  docker:up:full:
    desc: Start app + self-hosted Supabase together (full local dev).
    cmds:
      - docker compose -f .docker/compose.yml --profile full-dev up --build

  docker:down:
    desc: Stop all docker compose services and self-hosted Supabase.
    cmds:
      - docker compose -f .docker/compose.yml --profile full-dev down
      - bunx supabase stop || true

  db:login:
    desc: Authenticate the Supabase CLI.
    cmds:
      - bunx supabase login

  db:link:
    desc: Link this repo to the hosted Supabase project.
    cmds:
      - bun run db:link

  db:push:
    desc: Apply generated Supabase migrations and seed data.
    cmds:
      - bun run db:push

  db:types:
    desc: Generate Supabase TypeScript types.
    cmds:
      - bun run db:types

  verify:
    desc: Run checks, typecheck, and unit tests.
    cmds:
      - task: check
      - task: typecheck
      - task: test:run
