name: marketlab

services:
  app:
    profiles: ["dev", "full-dev"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.dev
    container_name: marketlab-app
    ports:
      - "3000:3000"
    env_file:
      - path: ../.env.local
        required: false
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ..:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: bun run dev
    restart: unless-stopped

  supabase:
    profiles: ["local-db", "full-dev"]
    build:
      context: ..
      dockerfile: .docker/Dockerfile.dev
    container_name: marketlab-supabase
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - supabase_node_modules:/workspace/node_modules
    network_mode: host
    command: >
      sh -c "supabase start && tail -f /dev/null"
    restart: "no"

volumes:
  app_node_modules:
  app_next:
  supabase_node_modules:
